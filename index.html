<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMv2 · Node Operator Groups · Hoodi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111;
      --surface:  #1a1a1a;
      --hover:    #222222;
      --border:   #2a2a2a;
      --border-2: #383838;
      --text-1:   #f0f0f0;
      --text-2:   #a0a0a0;
      --text-3:   #606060;
      --blue:     #60a5fa;
      --green:    #4ade80;
      --red:      #f87171;
      --amber:    #fbbf24;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      padding: 24px 28px 64px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: var(--text-1);
      line-height: 1.5;
    }

    /* ── HEADER ───────────────────────────────── */
    .board-header {
      max-width: 1380px;
      margin: 0 auto 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-2);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .venue-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .venue-meta {
      font-size: 11px;
      color: var(--text-3);
      text-align: right;
      line-height: 1.6;
    }

    .header-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-refs { display: flex; flex-direction: column; gap: 3px; }

    .ref-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-3); }
    .ref-lbl { font-size: 11px; font-weight: 500; color: var(--text-2); min-width: 52px; }
    .ref-row a { font-family: 'SF Mono', 'Roboto Mono', monospace; font-size: 11px; color: var(--blue); text-decoration: none; }
    .ref-row a:hover { text-decoration: underline; }

    .rpc-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .rpc-lbl { font-size: 11px; font-weight: 500; color: var(--text-2); min-width: 52px; }
    .rpc-input {
      background: var(--bg);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      color: var(--text-1);
      padding: 4px 8px;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 11px;
      width: 360px;
      outline: none;
    }
    .rpc-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }

    .load-btn {
      background: transparent;
      color: var(--text-1);
      border: 1px solid var(--border-2);
      border-radius: 5px;
      padding: 7px 18px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .load-btn:hover { background: var(--hover); border-color: var(--text-3); }
    .load-btn:disabled { color: var(--text-3); border-color: var(--border); cursor: default; }

    /* ── SUMMARY ──────────────────────────────── */
    .tote-summary {
      max-width: 1380px;
      margin: 0 auto 20px;
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .summary-cell {
      flex: 1;
      padding: 10px 20px;
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    .summary-cell .big {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-1);
      display: block;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .summary-cell .lbl {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
    }

    .status-cell {
      flex: 2;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      font-size: 12px;
      color: var(--text-3);
      background: var(--bg);
    }
    .status-cell.error { color: var(--red); font-weight: 500; }
    .status-cell.ok    { color: var(--green); font-weight: 500; }

    /* ── BOND CURVES ──────────────────────────── */
    .curves-wrap {
      max-width: 1380px;
      margin: 0 auto 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .curves-head {
      padding: 8px 14px;
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.02em;
      border-bottom: 1px solid var(--border);
    }

    /* ── STEP CHART DROPDOWN (per-card) ──────────── */
    .cs-section {
      margin-top: 10px;
      border-top: 1px solid var(--border);
    }
    .cs-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0 4px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
    }
    .cs-toggle:hover { color: var(--text-2); }
    .cs-compact {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      line-height: 1.7;
      padding-bottom: 4px;
    }
    .cs-compact-row {
      display: flex;
      gap: 8px;
    }
    .cs-compact-row span:first-child {
      min-width: 82px;
      flex-shrink: 0;
    }
    .cs-compact-row span:last-child { color: var(--text-2); }
    .curves-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 0;
    }
    .curve-card {
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      scroll-margin-top: 20px;
    }
    .curve-svg-wrap { position: relative; }
    .curve-svg-wrap .crosshair-x,
    .curve-svg-wrap .crosshair-y {
      stroke: var(--text-2);
      stroke-width: 0.6;
      stroke-dasharray: 2,2;
      opacity: 0;
      pointer-events: none;
    }
    .curve-svg-wrap .crosshair-dot {
      fill: var(--text-1);
      stroke: var(--bg);
      stroke-width: 1;
      opacity: 0;
      pointer-events: none;
    }
    .curve-svg-wrap.active .crosshair-x,
    .curve-svg-wrap.active .crosshair-y,
    .curve-svg-wrap.active .crosshair-dot { opacity: 1; }
    .curve-tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--bg);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      padding: 4px 7px;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-1);
      white-space: nowrap;
      transform: translate(-50%, -100%);
      margin-top: -6px;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 2;
    }
    .curve-tooltip.visible { opacity: 1; }
    .curve-tooltip .tt-keys { color: var(--text-2); }
    .curve-tooltip .tt-eth { color: var(--green); font-weight: 600; }
    .curve-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .curve-id-badge {
      width: 22px; height: 22px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #0a0a0a;
    }
    .curve-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-1);
    }
    .curve-chart svg { display: block; }
    .curve-intervals {
      margin-top: 8px;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      line-height: 1.6;
    }
    .curve-intervals span { color: var(--text-2); }

    .curve-step-charts {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .curve-step-item {
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .curve-step-label {
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 6px;
      font-family: 'Inter', sans-serif;
    }

    .curve-params {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      line-height: 1.65;
      display: grid;
      grid-template-columns: max-content 1fr;
      column-gap: 12px;
      row-gap: 1px;
    }
    .cp-row { display: contents; }
    .cp-lbl { color: var(--text-3); white-space: nowrap; }
    .cp-block {
      grid-column: 1 / -1;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .cp-block > .cp-lbl {
      display: block;
      margin-bottom: 6px;
    }
    .cp-val { color: var(--text-2); }
    .cp-steps { display: flex; flex-wrap: wrap; gap: 3px; }

    /* ── PERF WEIGHTS DONUT ───────────────────────── */
    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 2px;
    }
    .donut-legend {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      line-height: 1.9;
    }
    .donut-leg-row { display: flex; align-items: center; gap: 5px; }
    .donut-dot {
      width: 6px; height: 6px;
      border-radius: 1px;
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* ── STRIKES BADGE ────────────────────────────── */
    .strikes-badge-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .strikes-badge {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--hover);
      border: 1px solid var(--border-2);
      border-radius: 3px;
      padding: 1px 5px;
    }
    .strikes-sub {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
    }
    .cp-step-item {
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 4px;
      color: var(--text-2);
    }

    .curve-cell {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .curve-cell .curve-id-tag {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 4px;
      border-radius: 3px;
      color: #0a0a0a;
    }

    /* ── GROUP SECTIONS ───────────────────────── */
    .races {
      max-width: 1380px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .race-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .race-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      background: var(--surface);
    }
    .race-header:hover { background: var(--hover); }

    .race-num-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      min-width: 20px;
    }

    .race-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
    }

    .race-subtitle {
      font-size: 12px;
      color: var(--text-3);
      margin-left: 2px;
    }

    .race-chev {
      margin-left: auto;
      color: var(--text-3);
      font-size: 10px;
    }

    .race-body { overflow-x: auto; }
    .race-body::-webkit-scrollbar { height: 4px; }
    .race-body::-webkit-scrollbar-track { background: var(--surface); }
    .race-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
    .race-body::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ── TABLE ────────────────────────────────── */
    table.runners {
      width: 100%;
      min-width: 1230px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    table.runners thead tr {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    table.runners th {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-align: left;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    table.runners td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table.runners tr:last-child td { border-bottom: none; }
    table.runners tbody tr:hover td { background: var(--hover); }

    .cloth {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      flex-shrink: 0;
    }

    .td-cloth { width: 32px; }
    .td-noid  {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      text-align: right;
      width: 44px;
      padding-right: 16px !important;
    }
    .td-name  { font-weight: 500; font-size: 13px; overflow: hidden; }
    .td-name > span,
    .name-details summary { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .td-desc  {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-3);
      margin-top: 4px;
      max-width: 360px;
      line-height: 1.5;
      white-space: normal;
    }

    .name-details { display: inline; }
    .name-details summary {
      list-style: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      color: var(--text-1);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .name-details summary::-webkit-details-marker { display: none; }
    .name-details summary::after {
      content: '›';
      color: var(--text-3);
      font-size: 12px;
      font-weight: 400;
      transition: transform 0.15s;
      display: inline-block;
    }
    .name-details[open] summary::after { transform: rotate(90deg); }
    .td-share {
      text-align: right;
      font-weight: 600;
      font-size: 13px;
      color: var(--amber);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .td-num {
      text-align: right;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 12px;
      color: var(--text-2);
      font-variant-numeric: tabular-nums;
    }
    .td-bond {
      text-align: right;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 12px;
      color: var(--green);
      font-variant-numeric: tabular-nums;
    }
    .td-wt {
      text-align: right;
      font-weight: 600;
      font-size: 13px;
      color: var(--blue);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .td-addr { white-space: nowrap; }
    .td-addr a {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      text-decoration: none;
    }
    .td-addr a:hover { color: var(--blue); }

    /* ── EXTERNAL OPERATOR ────────────────────── */
    .correspondents {
      padding: 7px 14px 7px 12px;
      border-top: 1px solid var(--border);
      border-left: 3px solid var(--border-2);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .corr-lbl {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      flex-shrink: 0;
    }

    .corr-entry {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-2);
    }

    .corr-type {
      background: var(--hover);
      border: 1px solid var(--border-2);
      color: var(--text-2);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .corr-val {
      color: var(--text-1);
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 11px;
    }
    .corr-stake {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
    }
    .corr-hex {
      color: var(--text-3);
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
    }

    .empty-card {
      padding: 16px 14px;
      color: var(--text-3);
      font-size: 12px;
    }

    /* ── QUEUES SECTION ──────────────────────── */
    .queues-wrap {
      max-width: 1380px;
      margin: 20px auto 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .queues-head {
      padding: 8px 14px;
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.02em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .queues-addr {
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      text-decoration: none;
      font-weight: 400;
      letter-spacing: 0;
    }
    .queues-addr:hover { color: var(--blue); }
    .queues-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .queues-col {
      padding: 12px 16px;
      border-right: 1px solid var(--border);
    }
    .queues-col:last-child { border-right: none; }
    .queue-col-head {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .queue-col-meta {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-3);
      font-family: 'SF Mono', 'Roboto Mono', monospace;
    }
    .queue-col-sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0;
      margin-bottom: 6px;
    }
    /* #id  grp  name                    bar   value  gap */
    .alloc-item {
      display: grid;
      grid-template-columns: 30px 16px minmax(0, 1fr) 80px 90px 50px;
      align-items: center;
      gap: 6px;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 10px;
      padding: 3px 10px 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .alloc-item:last-of-type { border-bottom: none; }
    .alloc-head {
      display: grid;
      grid-template-columns: 30px 16px minmax(0, 1fr) 80px 90px 50px;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.03em;
      padding: 0 10px 4px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1px;
    }
    /* When a column has an active simulation, widen value/gap to fit "cur+Δ" and "old → new" */
    .queues-col.sim-active .alloc-item,
    .queues-col.sim-active .alloc-head {
      grid-template-columns: 30px 16px minmax(0, 1fr) 70px 140px 100px;
    }
    .alloc-head-val { text-align: right; }
    .qi-grp {
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      line-height: 1;
    }
    .qi-grp-link { cursor: pointer; text-decoration: none; }
    .qi-grp-link:hover { opacity: 0.6; }
    .qi-noid { color: var(--text-3); }
    .qi-name {
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .qi-bar-col {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .qi-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .qi-bar-pct {
      font-size: 9px;
      color: var(--text-3);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      min-width: 24px;
      text-align: right;
    }
    .qi-bar-fill {
      height: 100%;
      border-radius: 2px;
      min-width: 2px;
      position: absolute;
      top: 0;
      left: 0;
    }
    .qi-bar-add { animation: simPulse 1.8s ease-in-out infinite; }
    @keyframes simPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    .qi-val-base { color: var(--text-3); }
    .qi-val-add  { color: var(--blue); margin-left: 3px; font-weight: 600; }
    .qi-gap-arrow { color: var(--text-3); margin: 0 3px; }
    .qi-val {
      color: var(--text-2);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .qi-trunc {
      font-size: 10px;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      color: var(--text-3);
      padding-top: 3px;
      grid-column: 1 / -1;
    }
    .queue-empty {
      font-size: 11px;
      color: var(--text-3);
    }

    .qi-gap {
      font-size: 10px;
      color: var(--text-2);
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    .alloc-item-dim { opacity: 0.42; }

    .alloc-grp-row {
      cursor: pointer;
      background: var(--surface);
    }
    .alloc-grp-row:hover { background: var(--hover); }
    .grp-chev {
      font-size: 8px;
      color: var(--text-3);
      display: inline-block;
      width: 100%;
      text-align: right;
      padding-right: 3px;
    }
    .qi-name-bold {
      color: var(--text-1) !important;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
    }
    .alloc-grp-detail .alloc-item {
      background: var(--bg);
    }

    /* ── SIM PANEL ──────────────────────────── */
    .sim-panel {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-2);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sim-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sim-lbl {
      font-size: 10px;
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }
    .sim-input {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      color: var(--text-1);
      font-family: 'SF Mono', 'Roboto Mono', monospace;
      font-size: 11px;
      padding: 3px 7px;
      width: 90px;
      outline: none;
      -moz-appearance: textfield;
    }
    .sim-input::-webkit-outer-spin-button,
    .sim-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .sim-input:focus { border-color: var(--blue); }
    .sim-btn {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      color: var(--text-2);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 10px;
      font-family: 'Inter', sans-serif;
    }
    .sim-btn:hover { background: var(--hover); color: var(--text-1); }
    .sim-btn:disabled { opacity: 0.4; cursor: default; }
    .sim-btn-reset { color: var(--text-3); }
    .sim-status {
      font-size: 10px;
      font-family: 'Inter', sans-serif;
      color: var(--text-3);
    }
    .sim-status.err { color: var(--red); }
    .sim-status.ok  { color: var(--blue); }

    /* ── FOOTER ───────────────────────────────── */
    .board-footer {
      max-width: 1380px;
      margin: 16px auto 0;
      font-size: 11px;
      color: var(--text-3);
    }
  </style>
</head>
<body>

<div class="board-header">
  <div class="header-top">
    <span class="venue-title">Node Operator Groups &mdash; CMv2</span>
    <span class="venue-meta">Chain 560048 &middot; Hoodi Network</span>
  </div>
  <div class="header-body">
    <div class="header-refs">
      <div class="ref-row">

        <a href="https://hoodi.etherscan.io/address/0x857289cCBFBc4C134Cc312022a104CD9b38d8AAE" target="_blank" rel="noopener">0x857289cCBFBc4C134Cc312022a104CD9b38d8AAE</a>
      </div>
      <div class="ref-row">
        <span class="ref-lbl">Curated</span>
        <a href="https://hoodi.etherscan.io/address/0x87EB69Ae51317405FD285efD2326a4a11f6173b9" target="_blank" rel="noopener">0x87EB69Ae51317405FD285efD2326a4a11f6173b9</a>

</div>

<div class="tote-summary">

  </div>
  <div class="summary-cell" id="cell-runners">
    <span class="big">—</span>
    <span class="lbl">Node Operators</span>
  </div>
  <div class="status-cell" id="status">Awaiting connection...</div>
</div>

<div id="queues-section"></div>

<div class="races" id="content"></div>

<div id="curves-section"></div>

<div class="board-footer">CMv2 &middot; Hoodi Testnet &middot; All figures in validator keys</div>

<script>
const ADDRESSES = {
  metaRegistry:       '0x857289cCBFBc4C134Cc312022a104CD9b38d8AAE',
  curatedModule:      '0x87EB69Ae51317405FD285efD2326a4a11f6173b9',
  parametersRegistry: '0xefb8e4091A75C4828826bf64595F392f87A07b37',
};

const META_REGISTRY_ABI = [
  'function getOperatorGroupsCount() view returns (uint256)',
  'function getOperatorGroup(uint256 groupId) view returns (tuple(tuple(uint64 nodeOperatorId, uint16 share)[] subNodeOperators, tuple(bytes data)[] externalOperators) groupInfo)',
  'function getNodeOperatorWeight(uint256 nodeOperatorId) view returns (uint256 weight)',
  'function getOperatorMetadata(uint256 nodeOperatorId) view returns (tuple(string name, string description, bool ownerEditsRestricted) metadata)',
  'function getBondCurveWeight(uint256 curveId) view returns (uint256 weight)',
];

const CURATED_MODULE_ABI = [
  'function getNodeOperatorsCount() view returns (uint256)',
  'function getNodeOperator(uint256 nodeOperatorId) view returns (tuple(uint32 totalAddedKeys, uint32 totalWithdrawnKeys, uint32 totalDepositedKeys, uint32 totalVettedKeys, uint32 stuckValidatorsCount, uint32 depositableValidatorsCount, uint32 targetLimit, uint8 targetLimitMode, uint32 totalExitedKeys, uint32 enqueuedCount, address managerAddress, address proposedManagerAddress, address rewardAddress, address proposedRewardAddress, bool extendedManagerPermissions) nodeOperator)',
  'function getNodeOperatorBalance(uint256 nodeOperatorId) view returns (uint256)',
  'function ACCOUNTING() view returns (address)',
  'function getDepositAllocationTargets() view returns (uint256[] currentValidators, uint256[] targetValidators)',
  'function getTopUpAllocationTargets() view returns (uint256[] currentAllocations, uint256[] targetAllocations)',
  'function getNodeOperatorWeightAndExternalStake(uint256 nodeOperatorId) view returns (uint256 weight, uint256 externalStake)',
  'function getDepositsAllocation(uint256 maxDepositAmount) view returns (uint256 allocated, uint256[] operatorIds, uint256[] allocations)',
  'function obtainDepositData(uint256 depositsCount, bytes depositCalldata) returns (bytes publicKeys, bytes signatures)',
  'function getSigningKeys(uint256 nodeOperatorId, uint256 startIndex, uint256 keysCount) view returns (bytes)',
  'function STAKING_ROUTER_ROLE() view returns (bytes32)',
  'function getRoleMember(bytes32 role, uint256 index) view returns (address)',
  'function getRoleMemberCount(bytes32 role) view returns (uint256)',
];

const ACCOUNTING_ABI = [
  'function getBondCurveId(uint256 nodeOperatorId) view returns (uint256)',
  'function getCurveInfo(uint256 curveId) view returns (tuple(tuple(uint256 minKeysCount, uint256 minBond, uint256 trend)[] intervals))',
];

const PARAMETERS_REGISTRY_ABI = [
  'function getCurveParameters(uint256 curveId) view returns (tuple(uint256 keyRemovalCharge, uint256 generalDelayedPenaltyAdditionalFine, uint256 keysLimit, uint32 queuePriority, uint32 queueMaxDeposits, tuple(uint256 minKeyNumber, uint256 value)[] rewardShareData, tuple(uint256 minKeyNumber, uint256 value)[] performanceLeewayData, uint256 strikesLifetime, uint256 strikesThreshold, uint256 badPerformancePenalty, uint256 attestationsWeight, uint256 blocksWeight, uint256 syncWeight, uint256 allowedExitDelay, uint256 exitDelayFee, uint256 maxElWithdrawalRequestFee) params)',
];

function renderAllocations({ metadataMap, depositTargets, topUpTargets, groupMap, noDataMap, cm, provider, stakingRouter }) {
  const root = document.getElementById('queues-section');
  if (!root) return;

  // ── Build raw rows ────────────────────────────────────────────────
  const depositRows = [];
  if (depositTargets) {
    const currs = depositTargets[0], tgts = depositTargets[1];
    const len = Math.min(currs?.length ?? 0, tgts?.length ?? 0);
    for (let i = 0; i < len; i++) {
      const cur = Number(currs[i] ?? 0);
      const tgt = Number(tgts[i] ?? 0);
      if (tgt <= 0) continue;
      const no = noDataMap?.[i];
      depositRows.push({
        id: i, cur, tgt,
        gap: cur - tgt,
        pct: cur / tgt * 100,
        atTarget: cur >= tgt,
        name: metadataMap?.[i]?.name,
        groupId: groupMap?.[i] ?? null,
        depositable: no ? Number(no.depositableValidatorsCount) : 0,
        totalDeposited: no ? Number(no.totalDepositedKeys) : 0,
      });
    }
  }

  const topUpRows = [];
  if (topUpTargets) {
    const currs = topUpTargets[0], tgts = topUpTargets[1];
    const len = Math.min(currs?.length ?? 0, tgts?.length ?? 0);
    for (let i = 0; i < len; i++) {
      const cur = BigInt(currs[i] ?? 0);
      const tgt = BigInt(tgts[i] ?? 0);
      if (tgt <= 0n) continue;
      const no = noDataMap?.[i];
      topUpRows.push({
        id: i, cur, tgt,
        gap: cur - tgt,
        pct: Number(cur * 10000n / tgt) / 100,
        atTarget: cur >= tgt,
        name: metadataMap?.[i]?.name,
        groupId: groupMap?.[i] ?? null,
        depositable: no ? Number(no.depositableValidatorsCount) : 0,
      });
    }
  }

  // ── State ──────────────────────────────────────────────────────────
  const expanded = new Set();
  // depSim: Map<opId, addedValidators (Number)>  | null
  // topSim: Map<opId, addedWei (BigInt)>          | null
  // Each also carries a sidecar `_total` field.
  let depSim = null;
  let topSim = null;
  let depBusy = false;
  let topBusy = false;
  let depErr  = null;
  let topErr  = null;

  function sortByGap(rows, isBig) {
    if (isBig) return [...rows].sort((a, b) => (a.gap > b.gap ? 1 : a.gap < b.gap ? -1 : 0));
    return [...rows].sort((a, b) => a.gap - b.gap);
  }

  function fmtGap(gap, isTopUp) {
    if (isTopUp) {
      if (gap === 0n) return '<span style="color:var(--green)">✓</span>';
      if (gap > 0n)   return '+' + fmtEthVal(gap);
      return '−' + fmtEthVal(-gap);
    }
    if (gap === 0) return '<span style="color:var(--green)">✓</span>';
    if (gap > 0)   return '+' + gap;
    return '−' + (-gap);
  }

  function buildBar(pct, color) {
    if (pct <= 0) return '';
    return '<div class="qi-bar-fill" style="width:' + Math.min(pct, 100).toFixed(1) + '%;background:' + color + '"></div>';
  }

  // Two-segment bar: existing (darker) + added overlay (lighter).
  function buildBarWithAdd(pctCur, pctAdd, baseColor) {
    let html = '';
    if (pctCur > 0) html += '<div class="qi-bar-fill" style="width:' + Math.min(pctCur,100).toFixed(1) + '%;background:' + baseColor + ';opacity:0.55"></div>';
    if (pctAdd > 0) {
      const start = Math.min(pctCur, 100);
      const w = Math.min(pctAdd, 100 - start);
      if (w > 0) html += '<div class="qi-bar-fill qi-bar-add" style="left:' + start.toFixed(1) + '%;width:' + w.toFixed(1) + '%;background:' + baseColor + '"></div>';
    }
    return html;
  }

  function getSim(isTopUp) { return isTopUp ? topSim : depSim; }
  function getAddForOp(id, isTopUp) {
    const sim = getSim(isTopUp);
    if (!sim) return null;
    return sim.get(id) ?? (isTopUp ? 0n : 0);
  }

  function buildOpRow(r, isTopUp) {
    const sim = getSim(isTopUp);
    const add = sim ? (sim.get(r.id) ?? (isTopUp ? 0n : 0)) : null;
    const hasAdd = sim && (isTopUp ? (add > 0n) : (add > 0));
    const newCur = sim ? (isTopUp ? (r.cur + add) : (r.cur + add)) : r.cur;
    const newGap = sim ? (isTopUp ? (newCur - r.tgt) : (newCur - r.tgt)) : r.gap;
    const newAt  = isTopUp ? (newCur >= r.tgt) : (newCur >= r.tgt);

    const pctCur = r.pct;
    const pctNew = sim
      ? (isTopUp ? (r.tgt > 0n ? Number(newCur * 10000n / r.tgt) / 100 : 0) : (r.tgt > 0 ? newCur / r.tgt * 100 : 0))
      : pctCur;
    const pctAdd = Math.max(0, pctNew - pctCur);

    const barColor = (sim ? newAt : r.atTarget) ? 'var(--green)' : 'var(--blue)';
    const fill = sim ? buildBarWithAdd(pctCur, pctAdd, barColor) : buildBar(pctCur, barColor);
    const pctLbl = (sim ? Math.round(pctNew) : Math.round(pctCur)) + '%';

    let valHtml, gapHtml;
    if (sim && hasAdd) {
      if (isTopUp) {
        valHtml = '<span class="qi-val-base">' + fmtEthVal(r.cur) + '</span>'
          + '<span class="qi-val-add">+' + fmtEthVal(add) + '</span>'
          + ' / ' + fmtEthAmount(r.tgt);
      } else {
        valHtml = '<span class="qi-val-base">' + r.cur + '</span>'
          + '<span class="qi-val-add">+' + add + '</span>'
          + ' / ' + r.tgt;
      }
      gapHtml = fmtGap(r.gap, isTopUp) + ' <span class="qi-gap-arrow">→</span> ' + fmtGap(newGap, isTopUp);
    } else {
      valHtml = isTopUp ? (fmtEthVal(r.cur) + ' / ' + fmtEthAmount(r.tgt)) : (r.cur + ' / ' + r.tgt);
      gapHtml = fmtGap(r.gap, isTopUp);
    }

    const dim = !isTopUp && r.depositable === 0;
    const titleAttr = dim ? ' title="depositable=0 — cannot receive deposits"' : '';
    return '<div class="alloc-item' + (dim ? ' alloc-item-dim' : '') + '"' + titleAttr + '>'
      + '<span></span><span></span>'
      + '<span class="qi-name"><span class="qi-noid" style="margin-right:6px">#' + r.id + '</span>' + (r.name ? escHtml(r.name) : '') + '</span>'
      + '<div class="qi-bar-col"><div class="qi-bar-wrap">' + fill + '</div><span class="qi-bar-pct">' + pctLbl + '</span></div>'
      + '<span class="qi-val">' + valHtml + '</span>'
      + '<span class="qi-gap">' + gapHtml + '</span>'
      + '</div>';
  }

  function buildGroupRow(g, isTopUp, prefix) {
    const key = prefix + '-' + (g.groupId == null ? 'un' : g.groupId);
    const isExp = expanded.has(key);
    const sim = getSim(isTopUp);

    // Aggregate sim addition across rows
    let add = isTopUp ? 0n : 0;
    if (sim) {
      for (const r of g.rows) {
        const a = sim.get(r.id);
        if (a == null) continue;
        if (isTopUp) add = add + a; else add = add + a;
      }
    }
    const hasAdd = sim && (isTopUp ? (add > 0n) : (add > 0));
    const newCur = sim ? (isTopUp ? (g.cur + add) : (g.cur + add)) : g.cur;
    const newGap = sim ? (isTopUp ? (newCur - g.tgt) : (newCur - g.tgt)) : g.gap;
    const newAt  = isTopUp ? (newCur >= g.tgt) : (newCur >= g.tgt);

    const pctCur = g.pct;
    const pctNew = sim
      ? (isTopUp ? (g.tgt > 0n ? Number(newCur * 10000n / g.tgt) / 100 : 0) : (g.tgt > 0 ? newCur / g.tgt * 100 : 0))
      : pctCur;
    const pctAdd = Math.max(0, pctNew - pctCur);

    const barColor = (sim ? newAt : g.atTarget) ? 'var(--green)' : 'var(--blue)';
    const fill = sim ? buildBarWithAdd(pctCur, pctAdd, barColor) : buildBar(pctCur, barColor);
    const pctLbl = (sim ? Math.round(pctNew) : Math.round(pctCur)) + '%';

    let valHtml, gapHtml;
    if (sim && hasAdd) {
      if (isTopUp) {
        valHtml = '<span class="qi-val-base">' + fmtEthVal(g.cur) + '</span>'
          + '<span class="qi-val-add">+' + fmtEthVal(add) + '</span>'
          + ' / ' + fmtEthAmount(g.tgt);
      } else {
        valHtml = '<span class="qi-val-base">' + g.cur + '</span>'
          + '<span class="qi-val-add">+' + add + '</span>'
          + ' / ' + g.tgt;
      }
      gapHtml = fmtGap(g.gap, isTopUp) + ' <span class="qi-gap-arrow">→</span> ' + fmtGap(newGap, isTopUp);
    } else {
      valHtml = isTopUp ? (fmtEthVal(g.cur) + ' / ' + fmtEthAmount(g.tgt)) : (g.cur + ' / ' + g.tgt);
      gapHtml = fmtGap(g.gap, isTopUp);
    }

    let grpHtml, label;
    if (g.groupId != null) {
      grpHtml = '<span class="qi-grp" style="color:var(--text-2)">' + g.groupId + '</span>';
      label = 'Group #' + g.groupId;
    } else {
      grpHtml = '<span class="qi-grp" style="color:var(--text-3)">—</span>';
      label = 'Ungrouped';
    }

    let html = '<div class="alloc-item alloc-grp-row" data-grp-key="' + key + '">'
      + '<span class="qi-noid"><span class="grp-chev">' + (isExp ? '▼' : '▶') + '</span></span>'
      + grpHtml
      + '<span class="qi-name qi-name-bold">' + label + '</span>'
      + '<div class="qi-bar-col"><div class="qi-bar-wrap">' + fill + '</div><span class="qi-bar-pct">' + pctLbl + '</span></div>'
      + '<span class="qi-val">' + valHtml + '</span>'
      + '<span class="qi-gap">' + gapHtml + '</span>'
      + '</div>';

    const subSorted = sortByGap(g.rows, isTopUp);
    html += '<div class="alloc-grp-detail" data-grp-detail="' + key + '" style="display:' + (isExp ? '' : 'none') + '">';
    for (const r of subSorted) html += buildOpRow(r, isTopUp);
    html += '</div>';
    return html;
  }

  function buildGroupView(rows, isTopUp, prefix) {
    const buckets = new Map();
    for (const r of rows) {
      const key = r.groupId == null ? 'un' : r.groupId;
      if (!buckets.has(key)) buckets.set(key, { groupId: r.groupId, rows: [] });
      buckets.get(key).rows.push(r);
    }
    const aggs = [];
    for (const b of buckets.values()) {
      let cur = isTopUp ? 0n : 0;
      let tgt = isTopUp ? 0n : 0;
      for (const r of b.rows) { cur = cur + r.cur; tgt = tgt + r.tgt; }
      const gap = cur - tgt;
      const pct = isTopUp
        ? (tgt > 0n ? Number(cur * 10000n / tgt) / 100 : 0)
        : (tgt > 0  ? cur / tgt * 100 : 0);
      const at  = isTopUp ? cur >= tgt : cur >= tgt;
      aggs.push({ ...b, cur, tgt, gap, pct, atTarget: at });
    }
    const sorted = sortByGap(aggs, isTopUp);
    if (!sorted.length) return '<div class="queue-empty">no groups</div>';
    let html = '';
    for (const g of sorted) html += buildGroupRow(g, isTopUp, prefix);
    return html;
  }

  function buildSimPanel(isTopUp) {
    const sim   = getSim(isTopUp);
    const busy  = isTopUp ? topBusy : depBusy;
    const err   = isTopUp ? topErr  : depErr;
    const ph    = isTopUp ? 'ETH' : 'count';
    const stepAttr = isTopUp ? '' : ' step="1"';
    // Eligible operators in this column (depositable > 0 for deposit; for top-up we don't easily know capacity, count rows below target).
    const elig = isTopUp
      ? topUpRows.filter(r => r.cur < r.tgt).length
      : depositRows.filter(r => r.depositable > 0).length;
    const eligTotal = isTopUp
      ? null
      : depositRows.reduce((s, r) => s + (r.depositable > 0 ? r.depositable : 0), 0);
    let status = '';
    if (busy) status = '<span class="sim-status">simulating…</span>';
    else if (err && sim == null) status = '<span class="sim-status err">' + escHtml(err) + '</span>';
    else if (sim) {
      const totLbl = isTopUp ? (fmtEthVal(sim._total) + ' ETH') : (sim._total + ' val');
      let extra = '';
      if (!isTopUp && sim._total === 0) {
        extra = ' · ' + elig + ' eligible op' + (elig !== 1 ? 's' : '') + ', ' + eligTotal + ' depositable key' + (eligTotal !== 1 ? 's' : '') + ' total';
      }
      status = '<span class="sim-status ok">applied: ' + totLbl + extra + '</span>';
    }
    // Always show eligibility hint for deposit column when no sim is active
    const hint = (!sim && !busy && !err && !isTopUp)
      ? '<span class="sim-status">eligible: ' + elig + ' op' + (elig !== 1 ? 's' : '') + ' · ' + eligTotal + ' depositable key' + (eligTotal !== 1 ? 's' : '') + '</span>'
      : '';
    const resetBtn = sim ? '<button class="sim-btn sim-btn-reset" data-sim-reset="' + (isTopUp ? 'top' : 'dep') + '">Reset</button>' : '';
    const disabled = busy ? ' disabled' : '';
    return '<div class="sim-panel">'
      + '<div class="sim-row">'
      + '<span class="sim-lbl">Simulate</span>'
      + '<input class="sim-input" data-sim-input="' + (isTopUp ? 'top' : 'dep') + '" type="number" min="0"' + stepAttr + ' placeholder="' + ph + '"' + disabled + ' />'
      + '<button class="sim-btn" data-sim-apply="' + (isTopUp ? 'top' : 'dep') + '"' + disabled + '>Apply</button>'
      + resetBtn
      + '</div>'
      + (status ? '<div class="sim-row">' + status + '</div>' : '')
      + (hint   ? '<div class="sim-row">' + hint   + '</div>' : '')
      + '</div>';
  }

  function buildColumn(title, rows, isTopUp, prefix) {
    const active = !!getSim(isTopUp);
    return '<div class="queues-col' + (active ? ' sim-active' : '') + '">'
      + '<div class="queue-col-head"><span>' + title + '</span></div>'
      + '<div class="alloc-head">'
      +   '<span></span><span style="text-align:center">#</span><span>Group</span>'
      +   '<span class="alloc-head-val" style="grid-column:4/6">cur / tgt</span>'
      +   '<span class="alloc-head-val">gap</span>'
      + '</div>'
      + buildGroupView(rows, isTopUp, prefix)
      + buildSimPanel(isTopUp)
      + '</div>';
  }

  function rerender() {
    root.innerHTML = '<div class="queues-wrap">'
      + '<div class="queues-head">Allocations</div>'
      + '<div class="queues-body">'
      +   buildColumn('Deposit allocation (Keys)', depositRows, false, 'dep')
      +   buildColumn('Top-up allocation (Ether)',  topUpRows,   true,  'top')
      + '</div>'
      + '</div>';
    wireUp();
  }

  function wireUp() {
    root.querySelectorAll('.alloc-grp-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.qi-grp-link')) return;
        const key = row.dataset.grpKey;
        if (expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        rerender();
      });
    });

    root.querySelectorAll('[data-sim-apply]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const which = btn.dataset.simApply;
        const isTopUp = which === 'top';
        const input = root.querySelector('[data-sim-input="' + which + '"]');
        const val = (input?.value || '').trim();
        if (!val || parseFloat(val) <= 0) return;
        await runSim(isTopUp, val);
      });
    });

    root.querySelectorAll('[data-sim-reset]').forEach(btn => {
      btn.addEventListener('click', () => {
        const which = btn.dataset.simReset;
        if (which === 'top') { topSim = null; topErr = null; }
        else                 { depSim = null; depErr = null; }
        rerender();
      });
    });
  }

  async function runSim(isTopUp, val) {
    if (isTopUp && topBusy) return;
    if (!isTopUp && depBusy) return;
    if (isTopUp) { topBusy = true; topErr = null; topSim = null; }
    else         { depBusy = true; depErr = null; depSim = null; }
    rerender();
    try {
      if (isTopUp) await runTopUpSim(val);
      else         await runDepositSim(val);
    } catch (e) {
      console.error('Simulation failed:', e);
      const msg = e.shortMessage || e.message || String(e);
      if (isTopUp) topErr = msg; else depErr = msg;
    } finally {
      if (isTopUp) topBusy = false; else depBusy = false;
      rerender();
    }
  }

  async function runTopUpSim(ethStr) {
    if (!cm) throw new Error('No contract handle');
    const weiAmount = ethers.parseEther(ethStr);
    const [, opIds, allocs] = await cm.getDepositsAllocation(weiAmount);
    const map = new Map();
    let total = 0n;
    for (let i = 0; i < opIds.length; i++) {
      const a = BigInt(allocs[i] ?? 0);
      if (a > 0n) {
        map.set(Number(opIds[i]), a);
        total += a;
      }
    }
    map._total = total;
    topSim = map;
  }

  async function runDepositSim(nStr) {
    if (!cm || !provider) throw new Error('No contract handle');
    if (!stakingRouter) throw new Error('StakingRouter address unknown — cannot impersonate');
    const N = parseInt(nStr, 10);
    if (!Number.isFinite(N) || N <= 0) throw new Error('Invalid N');

    // staticCall obtainDepositData via raw eth_call with `from` override
    const data = cm.interface.encodeFunctionData('obtainDepositData', [N, '0x']);
    const raw = await provider.call({ to: ADDRESSES.curatedModule, from: stakingRouter, data });
    const decoded = cm.interface.decodeFunctionResult('obtainDepositData', raw);
    const pubkeysHex = decoded[0];
    if (!pubkeysHex || pubkeysHex === '0x') {
      depSim = new Map(); depSim._total = 0; return;
    }
    const pkBytes = pubkeysHex.startsWith('0x') ? pubkeysHex.slice(2) : pubkeysHex;
    const totalKeys = pkBytes.length / 2 / 48;
    if (!Number.isInteger(totalKeys) || totalKeys === 0) {
      depSim = new Map(); depSim._total = 0; return;
    }
    // Chunk result into 48-byte (96 hex chars) pubkeys (Array preserves duplicates if any)
    const resultPks = [];
    for (let i = 0; i < pkBytes.length; i += 96) {
      resultPks.push('0x' + pkBytes.slice(i, i + 96).toLowerCase());
    }

    // For each eligible operator, fetch their depositable pubkeys and build lookup
    const eligibleOps = depositRows.filter(r => r.depositable > 0);
    const lookup = new Map(); // pubkeyHex → opId
    await Promise.all(eligibleOps.map(async (op) => {
      try {
        const keysHex = await cm.getSigningKeys(op.id, op.totalDeposited, op.depositable);
        const s = keysHex.startsWith('0x') ? keysHex.slice(2) : keysHex;
        for (let i = 0; i < s.length; i += 96) {
          lookup.set('0x' + s.slice(i, i + 96).toLowerCase(), op.id);
        }
      } catch (e) {
        console.warn('getSigningKeys failed for op', op.id, e);
      }
    }));

    const counts = new Map();
    for (const pk of resultPks) {
      const opId = lookup.get(pk);
      if (opId == null) continue;
      counts.set(opId, (counts.get(opId) || 0) + 1);
    }
    counts._total = totalKeys;
    depSim = counts;
  }

  rerender();
}

const CURVE_COLORS = [
  '#60a5fa','#4ade80','#fbbf24','#f87171',
  '#a78bfa','#34d399','#fb923c','#f472b6',
];

function curveColor(i) { return CURVE_COLORS[i % CURVE_COLORS.length]; }

// Hoodi curated gate names, in deploy order. Curve IDs 0..N map to these.
const GATE_NAMES = [
  'Professional Operator Gate',
  'Professional Trusted Operator Gate',
  'Public Good Operator Gate',
  'Decentralization Operator Gate',
  'Extra Effort Operator Gate',
  'Intra-Operator DVT Cluster Gate',
  'Intra-Operator DVT Cluster Plus Gate',
];

function curveLabel(id) {
  const name = GATE_NAMES[id];
  return name || `Curve #${id}`;
}

// Total required bond (ETH) for N keys. minBond[i] is the bond at exactly
// minKeysCount[i] keys; trend[i] is the per-key cost beyond that within the
// i-th interval.
function bondForKeys(intervals, n) {
  if (!intervals || !intervals.length || n <= 0) return 0;
  let i = intervals.length - 1;
  while (i > 0 && intervals[i].minKeysCount > n) i--;
  const iv = intervals[i];
  return iv.minBond + (n - iv.minKeysCount) * iv.trend;
}

function curveSparkline(intervals, maxKeys, color) {
  const W = 70, H = 18, PAD = 1;
  if (!intervals || !intervals.length) {
    return `<svg width="${W}" height="${H}"></svg>`;
  }
  const last = intervals[intervals.length - 1];
  const target = Math.max(maxKeys, last.minKeysCount + 10, 20);
  const samples = Math.min(target, 80);
  let maxBond = 0;
  const pts = [];
  for (let n = 1; n <= samples; n++) {
    const b = bondForKeys(intervals, n);
    pts.push([n, b]);
    if (b > maxBond) maxBond = b;
  }
  const sx = (n) => ((n - 1) / (samples - 1)) * (W - 2 * PAD) + PAD;
  const sy = (b) => H - PAD - (maxBond > 0 ? (b / maxBond) * (H - 2 * PAD) : 0);
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join('');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round"/>
  </svg>`;
}

function decodeExternalOperator(hexData) {
  const raw = hexData.startsWith('0x') ? hexData.slice(2) : hexData;
  if (raw.length !== 20) return null;
  const type = parseInt(raw.slice(0, 2), 16);
  const moduleId = parseInt(raw.slice(2, 4), 16);
  const noId = Number(BigInt('0x' + raw.slice(4)));
  return { typeLabel: type === 0 ? 'NOR' : `Type ${type}`, moduleId, noId };
}

async function load() {
  const rpc = document.getElementById('rpcUrl').value.trim();
  if (!rpc) return;

  const btn = document.getElementById('loadBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  document.getElementById('content').innerHTML = '';
  document.getElementById('cell-races').querySelector('.big').textContent = '—';
  document.getElementById('cell-runners').querySelector('.big').textContent = '—';
  setStatus('Connecting to network...');

  try {
    const provider = new ethers.JsonRpcProvider(rpc);
    const meta = new ethers.Contract(ADDRESSES.metaRegistry, META_REGISTRY_ABI, provider);
    const cm   = new ethers.Contract(ADDRESSES.curatedModule, CURATED_MODULE_ABI, provider);

    const [groupsCount, noCount] = await Promise.all([
      meta.getOperatorGroupsCount(),
      cm.getNodeOperatorsCount(),
    ]);

    // index 0 is reserved (NO_GROUP_ID stone); real groups are 1..N-1
    const N = Number(groupsCount);
    const groupCount = N - 1;
    const noTotal = Number(noCount);
    setStatus(`Loading ${groupCount} group${groupCount !== 1 ? 's' : ''}...`);

    const groupPromises = [];
    for (let g = 1; g < N; g++) groupPromises.push(meta.getOperatorGroup(g));
    const groups = await Promise.all(groupPromises);

    const groupedNoIds = new Set();
    for (const g of groups)
      for (const sub of g.subNodeOperators)
        groupedNoIds.add(Number(sub.nodeOperatorId));

    const allNoIds = Array.from({ length: noTotal }, (_, i) => i);
    const ungroupedIds = allNoIds.filter(id => !groupedNoIds.has(id));

    setStatus(`Querying ${noTotal} operator${noTotal !== 1 ? 's' : ''}...`);

    const accountingAddr = await cm.ACCOUNTING();
    const accounting = new ethers.Contract(accountingAddr, ACCOUNTING_ABI, provider);

    const [noDataMap, metadataMap, weightMap, bondMap, curveIdMap, depositTargets, topUpTargets, extStakeMap] = await Promise.all([
      batchFetch(allNoIds, id => cm.getNodeOperator(id)),
      batchFetch(allNoIds, id => meta.getOperatorMetadata(id).catch(() => null)),
      batchFetch(allNoIds, id => meta.getNodeOperatorWeight(id)),
      batchFetch(allNoIds, id => cm.getNodeOperatorBalance(id)),
      batchFetch(allNoIds, id => accounting.getBondCurveId(id).catch(() => null)),
      cm.getDepositAllocationTargets().catch(() => null),
      cm.getTopUpAllocationTargets().catch(() => null),
      batchFetch(allNoIds, id => cm.getNodeOperatorWeightAndExternalStake(id).catch(() => null)),
    ]);

    const uniqueCurveIds = [...new Set(
      [0, ...Object.values(curveIdMap).filter(v => v != null).map(v => Number(v))]
    )].sort((a, b) => a - b);

    const curveInfoMap = {};
    await Promise.all(uniqueCurveIds.map(async (id) => {
      const info = await accounting.getCurveInfo(id).catch(() => null);
      if (!info) return;
      curveInfoMap[id] = info.intervals.map(iv => ({
        minKeysCount: Number(iv.minKeysCount),
        minBond: Number(BigInt(iv.minBond) * 10000n / 10n ** 18n) / 10000,
        trend: Number(BigInt(iv.trend) * 10000n / 10n ** 18n) / 10000,
      }));
    }));

    const paramsReg = new ethers.Contract(ADDRESSES.parametersRegistry, PARAMETERS_REGISTRY_ABI, provider);
    const curveParamsMap = {};
    const curveWeightMap = {};
    await Promise.all(uniqueCurveIds.map(async (id) => {
      const [p, w] = await Promise.all([
        paramsReg.getCurveParameters(id).catch(() => null),
        meta.getBondCurveWeight(id).catch(() => null),
      ]);
      if (p) curveParamsMap[id] = p;
      if (w != null) curveWeightMap[id] = Number(w);
    }));

    const groupMap = {};
    for (let i = 0; i < groups.length; i++)
      for (const sub of groups[i].subNodeOperators)
        groupMap[Number(sub.nodeOperatorId)] = i + 1;

    document.getElementById('cell-races').querySelector('.big').textContent = groupCount;
    document.getElementById('cell-runners').querySelector('.big').textContent = noTotal;
    // Resolve external operator names via LidoLocator → StakingRouter → NOR
    const extOpNameMap = {};
    const extOpsFlat = [];
    for (const g of groups)
      for (const ext of g.externalOperators) {
        const p = decodeExternalOperator(ext.data);
        if (p) extOpsFlat.push(p);
      }

    if (extOpsFlat.length > 0) {
      try {
        const locatorContract = new ethers.Contract(LIDO_LOCATOR_ADDR, LIDO_LOCATOR_ABI, provider);
        const srAddr = await locatorContract.stakingRouter();
        const srContract = new ethers.Contract(srAddr, STAKING_ROUTER_ABI, provider);

        const uniqueModuleIds = [...new Set(extOpsFlat.map(e => e.moduleId))];
        const moduleAddrMap = {};
        await Promise.all(uniqueModuleIds.map(async (mid) => {
          const mod = await srContract.getStakingModule(mid).catch(() => null);
          if (mod) moduleAddrMap[mid] = mod.stakingModuleAddress;
        }));

        await Promise.all(extOpsFlat.map(async ({ moduleId, noId }) => {
          const moduleAddr = moduleAddrMap[moduleId];
          if (!moduleAddr) return;
          const norContract = new ethers.Contract(moduleAddr, NOR_ABI, provider);
          const result = await norContract.getNodeOperator(noId, true).catch(() => null);
          if (result?.name) extOpNameMap[`${moduleId}-${noId}`] = result.name;
        }));
      } catch (e) {
        console.warn('Could not resolve external operator names:', e);
      }
    }

    setStatus('Loaded.', 'ok');

    // Find an address with STAKING_ROUTER_ROLE for impersonation in eth_call (deposit sim).
    let stakingRouter = null;
    try {
      const role = await cm.STAKING_ROUTER_ROLE();
      const cnt  = await cm.getRoleMemberCount(role);
      if (cnt > 0n) stakingRouter = await cm.getRoleMember(role, 0);
    } catch (e) { console.warn('Could not resolve STAKING_ROUTER_ROLE member:', e); }

    try { renderAllocations({ metadataMap, depositTargets, topUpTargets, groupMap, noDataMap, cm, provider, stakingRouter }); } catch(e) { console.warn('renderAllocations failed:', e); }
    renderBondCurves(uniqueCurveIds, curveInfoMap, curveParamsMap, curveWeightMap);
    renderGroups(groups, noDataMap, metadataMap, weightMap, bondMap, extOpNameMap, ungroupedIds, curveIdMap, curveInfoMap, uniqueCurveIds, extStakeMap);
  } catch (err) {
    setStatus('Error: ' + (err.shortMessage || err.message), 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

async function batchFetch(ids, fn) {
  const results = await Promise.all(ids.map(id => fn(id).catch(() => null)));
  const map = {};
  for (let i = 0; i < ids.length; i++) map[ids[i]] = results[i];
  return map;
}

function fmtEth(wei) {
  if (wei == null) return '—';
  const eth = Number(BigInt(wei)) / 1e18;
  return eth.toFixed(2) + ' Ξ';
}

function fmtEthPrecise(wei) {
  if (wei == null) return '—';
  const eth = Number(BigInt(wei)) / 1e18;
  if (eth === 0) return '0 Ξ';
  if (eth < 0.0001) return eth.toExponential(2) + ' Ξ';
  return eth.toPrecision(4).replace(/\.?0+$/, '') + ' Ξ';
}

function fmtEthVal(wei) {
  // like fmtEthAmount but without the Ξ suffix — for "cur / tgt Ξ" formatting
  return fmtEthAmount(wei).replace(/ ?Ξ$/, '');
}

function fmtEthAmount(wei) {
  const eth = Number(BigInt(wei)) / 1e18;
  if (eth === 0) return '0 Ξ';
  if (eth >= 10000) return Math.round(eth / 1000) + 'k Ξ';
  if (eth >= 1000)  return (eth / 1000).toFixed(1).replace(/\.0$/, '') + 'k Ξ';
  if (eth >= 100)   return eth.toFixed(0) + ' Ξ';
  if (eth >= 10)    return eth.toFixed(1) + ' Ξ';
  if (eth >= 1)     return eth.toFixed(2) + ' Ξ';
  return eth.toPrecision(3) + ' Ξ';
}

function fmtBP(v) {
  const n = Number(v) / 100;
  return n % 1 === 0 ? n + '%' : n.toFixed(2) + '%';
}

function fmtDuration(sec) {
  const s = Number(sec);
  if (s === 0) return '0';
  if (s % 86400 === 0) return (s / 86400) + 'd';
  if (s % 3600 === 0) return (s / 3600) + 'h';
  if (s % 60 === 0) return (s / 60) + 'm';
  return s + 's';
}

function fmtSteps(arr, fmt) {
  if (!arr?.length) return '<span style="color:var(--text-3)">—</span>';
  return arr.map(iv =>
    `<span class="cp-step-item">≥${Number(iv.minKeyNumber)}: ${fmt(iv.value)}</span>`
  ).join('');
}

function renderCurveParams(p, bondCurveWeight) {
  if (!p && bondCurveWeight == null) return '';
  const rows = [];
  if (bondCurveWeight != null) rows.push(['Bond curve weight', bondCurveWeight.toLocaleString()]);
  if (p) {
    rows.push(
      ['Keys limit',         Number(p.keysLimit) === 0 ? '∞' : Number(p.keysLimit).toLocaleString()],
      ['Key removal charge', fmtEthPrecise(p.keyRemovalCharge)],
      ['Bad perf fine',      fmtEthPrecise(p.badPerformancePenalty)],
      ['Delayed fine',       fmtEthPrecise(p.generalDelayedPenaltyAdditionalFine)],
      ['Strikes',            `${Number(p.strikesThreshold)} hits · ${Number(p.strikesLifetime)} frames`],
      ['Exit delay',         fmtDuration(p.allowedExitDelay)],
      ['Exit delay fee',     fmtEthPrecise(p.exitDelayFee)],
      ['EL req fee cap',     fmtEthPrecise(p.maxElWithdrawalRequestFee)],
      ['Queue',              `priority ${Number(p.queuePriority)} · ${Number(p.queueMaxDeposits) === 0xFFFFFFFF ? 'no key count limit' : 'max ' + Number(p.queueMaxDeposits).toLocaleString()}`],
    );
  }
  const textRows = rows.map(([l, v]) =>
    `<div class="cp-row"><span class="cp-lbl">${l}</span><span class="cp-val">${v}</span></div>`
  ).join('');
  const extraBlocks = p
    ? `<div class="cp-block"><span class="cp-lbl">Strikes</span>${renderStrikesSegmented(p)}</div>
       <div class="cp-block"><span class="cp-lbl">Perf weights</span>${renderPerfWeightsDonut(p)}</div>`
    : '';
  return `<div class="curve-params">
    ${textRows}
    ${extraBlocks}
  </div>`;
}

function renderStrikesSegmented(p) {
  const threshold = Number(p.strikesThreshold);
  const lifetime  = Number(p.strikesLifetime);
  return `<div class="strikes-badge-wrap">
    <span class="strikes-badge">${threshold}</span>
    <span class="strikes-sub">hits · within ${lifetime} frames</span>
  </div>`;
}

function renderPerfWeightsDonut(p) {
  const att  = Number(p.attestationsWeight);
  const prop = Number(p.blocksWeight);
  const sync = Number(p.syncWeight);
  const total = att + prop + sync;
  if (total === 0) return '';

  const r = 26, cx = 36, cy = 36, SW = 7;
  const circ = 2 * Math.PI * r;
  const GAP  = 2;

  const segs = [
    { v: att,  color: '#60a5fa', label: `att ${att}` },
    { v: prop, color: '#fbbf24', label: `proposal ${prop}` },
    { v: sync, color: '#4ade80', label: `sync ${sync}` },
  ].filter(s => s.v > 0);

  const drawableLen = circ - GAP * segs.length;
  let accum = 0;
  const circles = segs.map(({ v, color }) => {
    const len = (v / total) * drawableLen;
    const svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}"
      stroke-width="${SW}" stroke-dasharray="${len.toFixed(2)} ${(circ - len).toFixed(2)}"
      stroke-dashoffset="${(-accum).toFixed(2)}" opacity="0.5"/>`;
    accum += len + GAP;
    return svg;
  }).join('');

  const legend = segs.map(({ color, label }) =>
    `<div class="donut-leg-row">
      <span class="donut-dot" style="background:${color}"></span>${label}/${total}
    </div>`
  ).join('');

  return `<div class="donut-wrap">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${SW}"/>
      <g transform="rotate(-90 ${cx} ${cy})">${circles}</g>
      <text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="10"
        fill="var(--text-3)" font-family="SF Mono, monospace">${total}</text>
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}

function fmtStepCompact(data) {
  if (!data?.length) return '—';
  return data.map(iv => `≥${Number(iv.minKeyNumber)}: ${fmtBP(iv.value)}`).join(' · ');

function renderBondCurves(curveIds, curveInfoMap, curveParamsMap = {}, curveWeightMap = {}) {
  const root = document.getElementById('curves-section');
  if (!curveIds.length) { root.innerHTML = ''; return; }

  let maxKeys = 20;
  for (const id of curveIds) {
    const ivs = curveInfoMap[id];
    if (!ivs?.length) continue;
    const last = ivs[ivs.length - 1];
    if (last.minKeysCount + 10 > maxKeys) maxKeys = last.minKeysCount + 10;
  }
  const samples = Math.min(Math.max(maxKeys, 20), 200);

  let cardsHtml = '';
  curveIds.forEach((id, idx) => {
    const intervals = curveInfoMap[id];
    const color = curveColor(idx);
    if (!intervals?.length) {
      cardsHtml += `<div class="curve-card" id="curve-card-${id}">
        <div class="curve-card-head">
          <span class="curve-id-badge" style="background:${color}">${id}</span>
          <span class="curve-name">${escHtml(curveLabel(id))} <span style="color:var(--text-3);font-weight:400">· no data</span></span>
        </div>
      </div>`;
      return;
    }

    let maxBond = 0;
    for (let n = 1; n <= samples; n++) {
      const b = bondForKeys(intervals, n);
      if (b > maxBond) maxBond = b;
    }
    window._curveData[id] = { intervals, color, samples, maxBond };

    const intervalsTxt = intervals.map(iv =>
      `<div><span>≥${iv.minKeysCount} keys</span> · ${iv.trend} Ξ/key</div>`
    ).join('');

    const stepChartsHtml = (() => {
      const p = curveParamsMap[id];
      if (!p) return '';
      const defs = [
        { key: `${id}-reward`, data: p.rewardShareData,       color: '#4ade80', label: 'Reward share' },
        { key: `${id}-leeway`, data: p.performanceLeewayData,  color: '#a78bfa', label: 'Perf leeway'  },
      ];
      const valid = defs.filter(({ data }) => data?.length);
      if (!valid.length) return '';

      valid.forEach(({ key, data, color }) => {
        window._stepData[key] = { data, samples, maxVal: Math.max(...data.map(d => Number(d.value))), color };
      });

      return valid.map(({ key, data, color, label }) =>
        `<div class="cs-section">
          <div class="cs-toggle" onclick="toggleStepCharts('${key}')">
            <span>${label}</span>
            <span class="race-chev" id="step-chev-${key}">▶</span>
          </div>
          <div id="step-compact-${key}" class="cs-compact">
            <div class="cs-compact-row"><span>${fmtStepCompact(data)}</span></div>
          </div>
          <div id="step-charts-${key}" style="display:none">
            <div class="curve-svg-wrap" data-step-key="${key}">
              ${stepFunctionSvg(data, samples, color)}
              <div class="curve-tooltip" id="step-tt-${key}"></div>
            </div>
          </div>
        </div>`
      ).join('');
    })();

    cardsHtml += `<div class="curve-card" id="curve-card-${id}">
      <div class="curve-card-head">
        <span class="curve-id-badge" style="background:${color}">${id}</span>
        <span class="curve-name">${escHtml(curveLabel(id))}</span>
      </div>
      <div class="cs-section">
        <div class="cs-toggle" onclick="toggleBondChart(${id})">
          <span style="color:${color}">Bond curve</span>
          <span class="race-chev" id="bond-chev-${id}">▼</span>
        </div>
        <div id="bond-compact-${id}" class="curve-intervals" style="display:none">${intervalsTxt}</div>
        <div id="bond-chart-${id}">
          <div class="curve-svg-wrap" data-curve-id="${id}">
            ${bigCurveSvg(intervals, samples, maxBond, color)}
            <div class="curve-tooltip" id="curve-tt-${id}"></div>
          </div>
          <div class="curve-intervals">${intervalsTxt}</div>
        </div>
      </div>
      ${stepChartsHtml}
      ${renderCurveParams(curveParamsMap[id], curveWeightMap[id])}
    </div>`;
  });

  root.innerHTML = `<div class="curves-wrap">
    <div class="curves-head">Bond Curves &middot; ${curveIds.length}</div>
    <div class="curves-grid">${cardsHtml}</div>
  </div>`;

  root.querySelectorAll('[data-curve-id]').forEach(wrap => {

}

function bigCurveSvg(intervals, samples, maxBond, color) {
  const { W, H, PADL, PADR, PADT, PADB } = CURVE_CHART;
  const innerW = W - PADL - PADR, innerH = H - PADT - PADB;
  const pts = [];
  for (let n = 1; n <= samples; n++) {
    pts.push([n, bondForKeys(intervals, n)]);
  }
  const sx = (n) => PADL + ((n - 1) / (samples - 1)) * innerW;
  const sy = (b) => PADT + innerH - (maxBond > 0 ? (b / maxBond) * innerH : 0);
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join('');
  const area = d + `L${sx(samples).toFixed(1)},${(PADT + innerH).toFixed(1)} L${sx(1).toFixed(1)},${(PADT + innerH).toFixed(1)} Z`;

  // Y-axis ticks at 0, ~half, max
  const yTicks = [0, maxBond / 2, maxBond];
  const yTickEls = yTicks.map(v => `
    <text x="${PADL - 4}" y="${sy(v) + 3}" font-size="9" fill="var(--text-3)" text-anchor="end" font-family="SF Mono, monospace">${v.toFixed(v < 10 ? 1 : 0)}Ξ</text>
    <line x1="${PADL}" y1="${sy(v)}" x2="${W - PADR}" y2="${sy(v)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="${v === 0 ? '' : '1,2'}"/>
  `).join('');

  // X-axis ticks every ~25% of samples
  const xTickCounts = [1, Math.round(samples * 0.33), Math.round(samples * 0.66), samples];
  const xTickEls = xTickCounts.map(n => `
    <text x="${sx(n)}" y="${H - 4}" font-size="9" fill="var(--text-3)" text-anchor="${n === 1 ? 'start' : n === samples ? 'end' : 'middle'}" font-family="SF Mono, monospace">${n}</text>
  `).join('');

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    ${yTickEls}
    <path d="${area}" fill="${color}" fill-opacity="0.12"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round"/>
    <line x1="${PADL}" y1="${PADT}" x2="${PADL}" y2="${PADT + innerH}" stroke="var(--border-2)" stroke-width="0.5"/>
    ${xTickEls}
    <line class="crosshair-x" x1="0" y1="${PADT}" x2="0" y2="${PADT + innerH}"/>
    <line class="crosshair-y" x1="${PADL}" y1="0" x2="${W - PADR}" y2="0"/>
    <circle class="crosshair-dot" cx="0" cy="0" r="3"/>
    <rect x="${PADL}" y="${PADT}" width="${innerW}" height="${innerH}" fill="transparent" pointer-events="all"/>
  </svg>`;
}

function stepGetVal(data, n) {
  let v = Number(data[0].value);
  for (const iv of data) {
    if (Number(iv.minKeyNumber) <= n) v = Number(iv.value);
  }
  return v;
}

function stepFunctionSvg(data, samples, color) {
  const { W, H, PADL, PADR, PADT, PADB } = CURVE_CHART;
  if (!data?.length) return '';
  const innerW = W - PADL - PADR, innerH = H - PADT - PADB;

  const maxVal = Math.max(...data.map(d => Number(d.value)));
  if (maxVal === 0) return '';

  const sx = n => PADL + ((n - 1) / Math.max(samples - 1, 1)) * innerW;
  const sy = v => PADT + innerH - (v / maxVal) * innerH;

  let d = '', prevY = null;
  for (let n = 1; n <= samples; n++) {
    const v = stepGetVal(data, n);
    const x = sx(n).toFixed(1), y = sy(v).toFixed(1);
    if (prevY === null) { d += `M${x},${y}`; }
    else if (y !== prevY) { d += `H${x}V${y}`; }
    else { d += `H${x}`; }
    prevY = y;
  }

  const area = d + `V${(PADT + innerH).toFixed(1)}H${sx(1).toFixed(1)}Z`;

  // Y-axis ticks: 0, half, max  — same pattern as bigCurveSvg
  const yTicks = [0, maxVal / 2, maxVal];
  const yTickEls = yTicks.map(v => {
    const pct = v / 100;
    const lbl = pct % 1 === 0 ? pct + '%' : pct.toFixed(1) + '%';
    return `
      <text x="${PADL - 4}" y="${sy(v) + 3}" font-size="9" fill="var(--text-3)" text-anchor="end" font-family="SF Mono, monospace">${lbl}</text>
      <line x1="${PADL}" y1="${sy(v)}" x2="${W - PADR}" y2="${sy(v)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="${v === 0 ? '' : '1,2'}"/>`;
  }).join('');

  // X-axis ticks — identical to bigCurveSvg
  const xTickCounts = [1, Math.round(samples * 0.33), Math.round(samples * 0.66), samples];
  const xTickEls = xTickCounts.map(n => `
    <text x="${sx(n)}" y="${H - 4}" font-size="9" fill="var(--text-3)" text-anchor="${n === 1 ? 'start' : n === samples ? 'end' : 'middle'}" font-family="SF Mono, monospace">${n}</text>
  `).join('');

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    ${yTickEls}
    <path d="${area}" fill="${color}" fill-opacity="0.12"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round"/>
    <line x1="${PADL}" y1="${PADT}" x2="${PADL}" y2="${PADT + innerH}" stroke="var(--border-2)" stroke-width="0.5"/>
    ${xTickEls}
    <line class="crosshair-x" x1="0" y1="${PADT}" x2="0" y2="${PADT + innerH}"/>
    <line class="crosshair-y" x1="${PADL}" y1="0" x2="${W - PADR}" y2="0"/>
    <circle class="crosshair-dot" cx="0" cy="0" r="3"/>
    <rect x="${PADL}" y="${PADT}" width="${innerW}" height="${innerH}" fill="transparent" pointer-events="all"/>
  </svg>`;
}

function updateCrosshair(curveId, wrap, evt) {
  const data = window._curveData[curveId];
  if (!data) return;
  const { intervals, samples, maxBond } = data;
  const { W, H, PADL, PADR, PADT, PADB } = CURVE_CHART;
  const innerW = W - PADL - PADR, innerH = H - PADT - PADB;

  const rect = wrap.getBoundingClientRect();
  // Account for SVG scaling to wrap width
  const scaleX = rect.width / W;
  const scaleY = rect.height / H;
  const mx = (evt.clientX - rect.left) / scaleX;
  if (mx < PADL || mx > W - PADR) {
    wrap.classList.remove('active');
    document.getElementById(`curve-tt-${curveId}`)?.classList.remove('visible');
    return;
  }

  // Snap to integer key count
  const rawN = ((mx - PADL) / innerW) * (samples - 1) + 1;
  const n = Math.max(1, Math.min(samples, Math.round(rawN)));
  const bond = bondForKeys(intervals, n);

  const cx = PADL + ((n - 1) / (samples - 1)) * innerW;
  const cy = PADT + innerH - (maxBond > 0 ? (bond / maxBond) * innerH : 0);

  const svg = wrap.querySelector('svg');
  const cxLine = svg.querySelector('.crosshair-x');
  const cyLine = svg.querySelector('.crosshair-y');
  const dot = svg.querySelector('.crosshair-dot');
  cxLine.setAttribute('x1', cx); cxLine.setAttribute('x2', cx);
  cyLine.setAttribute('y1', cy); cyLine.setAttribute('y2', cy);
  dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
  wrap.classList.add('active');

  // Tooltip — anchor to dot in DOM coords
  const tt = document.getElementById(`curve-tt-${curveId}`);
  tt.innerHTML = `<span class="tt-keys">${n} keys</span> · <span class="tt-eth">${bond.toFixed(bond < 10 ? 2 : 1)} Ξ</span>`;
  tt.style.left = (cx * scaleX) + 'px';
  tt.style.top = (cy * scaleY) + 'px';
  tt.classList.add('visible');
}

function updateStepCrosshair(key, wrap, evt) {
  const entry = window._stepData[key];
  if (!entry) return;
  const { data, samples, maxVal, color } = entry;
  const { W, H, PADL, PADR, PADT, PADB } = CURVE_CHART;
  const innerW = W - PADL - PADR, innerH = H - PADT - PADB;

  const rect = wrap.getBoundingClientRect();
  const scaleX = rect.width / W, scaleY = rect.height / H;
  const mx = (evt.clientX - rect.left) / scaleX;
  if (mx < PADL || mx > W - PADR) {
    wrap.classList.remove('active');
    document.getElementById(`step-tt-${key}`)?.classList.remove('visible');
    return;
  }

  const rawN = ((mx - PADL) / innerW) * (samples - 1) + 1;
  const n = Math.max(1, Math.min(samples, Math.round(rawN)));
  const v = stepGetVal(data, n);
  const pct = (v / 100).toFixed(2).replace(/\.?0+$/, '') + '%';

  const cx = PADL + ((n - 1) / (samples - 1)) * innerW;
  const cy = PADT + innerH - (maxVal > 0 ? (v / maxVal) * innerH : 0);

  const svg = wrap.querySelector('svg');
  svg.querySelector('.crosshair-x').setAttribute('x1', cx); svg.querySelector('.crosshair-x').setAttribute('x2', cx);
  svg.querySelector('.crosshair-y').setAttribute('y1', cy); svg.querySelector('.crosshair-y').setAttribute('y2', cy);
  svg.querySelector('.crosshair-dot').setAttribute('cx', cx); svg.querySelector('.crosshair-dot').setAttribute('cy', cy);
  wrap.classList.add('active');

  const tt = document.getElementById(`step-tt-${key}`);
  tt.innerHTML = `<span class="tt-keys">${n} keys</span> · <span class="tt-eth">${pct}</span>`;
  tt.style.left = (cx * scaleX) + 'px';
  tt.style.top  = (cy * scaleY) + 'px';
  tt.classList.add('visible');
}

        <td class="td-wt">${wt !== null ? wt.toLocaleString() : '—'}</td>
        <td class="td-addr">${no ? addrLink(no.managerAddress) : '—'}</td>
        <td class="td-addr">${no ? addrLink(no.rewardAddress)  : '—'}</td>
      </tr>`;
    }

    html += `</tbody></table></div></div>`;
  }

  content.innerHTML = html;
}

function scrollToGroup(gid) {
  const card = document.getElementById('race-card-' + gid);
  if (!card) return;
  const body = document.getElementById('body-' + gid);
  const chev = document.getElementById('chev-' + gid);
  if (body && body.style.display === 'none') {
    body.style.display = '';
    if (chev) chev.textContent = '▼';
  }
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleRace(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  chev.textContent   = hidden ? '▼' : '▶';
}

window.addEventListener('load', load);
</script>
</body>
</html>
